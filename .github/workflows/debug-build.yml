name: Debug APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download cloudflared binary
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -o cloudflared
          chmod +x cloudflared

      - name: Setup cloudflared binary in assets
        run: |
          mkdir -p app/src/main/assets
          mv cloudflared app/src/main/assets/cloudflared
          ls -la app/src/main/assets/

      - name: Build Debug APK
        run: ./gradlew :app:assembleGithubDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/github/debug/app-github-debug.apk
          if-no-files-found: error
          retention-days: 7